{% extends 'articles/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4>Создание новой статьи</h4>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}

                    <hr>
                    <h5>Загрузка изображений</h5>
                    <input type="file" name="image" multiple accept="image/*" class="form-control mb-2">
                    <small class="text-muted">
                        Поддерживаемые форматы: JPG, JPEG, PNG, GIF, WEBP<br>
                        Можно выбрать несколько файлов
                    </small>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="{% url 'articles:home' %}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-success btn-lg">Отправить на модерацию</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
