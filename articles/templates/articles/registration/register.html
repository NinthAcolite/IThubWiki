{% extends 'articles/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Регистрация в Wiki IThub SPB</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-success btn-lg w-100 mt-3">
                        Зарегистрироваться
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    Уже есть аккаунт? 
                    <a href="{% url 'articles:login' %}" class="text-decoration-none">Войти</a>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-3 text-muted small">
            Регистрируясь, вы соглашаетесь с правилами использования Wiki.
        </div>
    </div>
</div>
{% endblock %}
